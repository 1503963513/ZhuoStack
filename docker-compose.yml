name: ${COMPOSE_PROJECT_NAME:-myapp}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${DB_MEMORY_LIMIT:-1g}
    cpus: ${DB_CPU_LIMIT:-1.0}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myapp123}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
      PGDATA: /var/lib/database/postgres
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILES:-5}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: ${REDIS_MEMORY_LIMIT:-256m}
    cpus: ${REDIS_CPU_LIMIT:-0.5}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILES:-5}

  api:
    image: ${APP_IMAGE_PREFIX:-myapp}-api:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        DB_TYPE: ${DB_TYPE:-postgres}
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: ${API_MEMORY_LIMIT:-512m}
    cpus: ${API_CPU_LIMIT:-1.0}
    env_file:
      - .env.deploy
    environment:
      NODE_ENV: production
      PORT: 3100
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      REDIS_REQUIRED: "true"
      FILE_STORAGE_PATH: /app/apps/api/uploads
    volumes:
      - api_uploads:/app/apps/api/uploads
    ports:
      - "127.0.0.1:${API_PORT:-3100}:3100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILES:-5}

  web:
    image: ${APP_IMAGE_PREFIX:-myapp}-web:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /var/cache/nginx:rw,nosuid,size=32m
      - /var/run:rw,nosuid,size=8m
      - /etc/nginx/conf.d:rw,noexec,nosuid,size=1m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    pids_limit: 128
    mem_limit: ${WEB_MEMORY_LIMIT:-256m}
    cpus: ${WEB_CPU_LIMIT:-0.5}
    ports:
      - "${WEB_PORT:-3000}:80"
      - "${WEB_TLS_PORT:-3443}:443"
    volumes:
      - ${TLS_CERT_DIR:-./docker/certs}:/etc/nginx/tls:ro
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILES:-5}

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  api_uploads:

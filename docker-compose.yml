name: ${COMPOSE_PROJECT_NAME:-myapp}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myapp123}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
      PGDATA: /var/lib/database/postgres
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ${APP_IMAGE_PREFIX:-myapp}-api:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        DB_TYPE: ${DB_TYPE:-postgres}
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      NODE_ENV: production
      PORT: 3100
      REDIS_URL: redis://redis:6379
      FILE_STORAGE_PATH: /app/apps/api/uploads
    volumes:
      - api_uploads:/app/apps/api/uploads
    ports:
      - "127.0.0.1:${API_PORT:-3100}:3100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${APP_IMAGE_PREFIX:-myapp}-web:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  api_uploads:

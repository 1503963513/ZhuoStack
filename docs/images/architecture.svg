<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">ZhuoStack architecture</title>
  <desc id="desc">A production-oriented full-stack architecture: Browser requests pass through an Nginx TLS ingress to the Next.js static web application and NestJS Fastify API. The API connects to PostgreSQL or MySQL, Redis, and local or cloud object storage. GitHub Actions verifies and builds Docker, PM2, and offline deployment packages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="web" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="deploy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#312e81" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h1 { font-size: 44px; font-weight: 700; fill: #0f172a; letter-spacing: -.7px; }
      .subtitle { font-size: 18px; font-weight: 400; fill: #475569; }
      .section { font-size: 14px; font-weight: 700; fill: #64748b; letter-spacing: 2.2px; }
      .node-title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .node-title-light { font-size: 22px; font-weight: 700; fill: #fff; }
      .node-text { font-size: 15px; font-weight: 500; fill: #475569; }
      .node-text-light { font-size: 15px; font-weight: 500; fill: #e0e7ff; }
      .small { font-size: 13px; font-weight: 600; fill: #64748b; }
      .small-light { font-size: 13px; font-weight: 600; fill: #dbeafe; }
      .line { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1450" cy="100" r="260" fill="#c7d2fe" opacity=".28"/>
  <circle cx="140" cy="900" r="230" fill="#a5f3fc" opacity=".18"/>

  <g class="title">
    <text x="96" y="94" class="h1">ZhuoStack Architecture</text>
    <text x="96" y="128" class="subtitle">Production-oriented NestJS + Next.js full-stack admin starter</text>
  </g>

  <g class="title">
    <text x="96" y="198" class="section">CLIENT &amp; INGRESS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="224" width="265" height="126" rx="22" fill="#ffffff"/>
    <circle cx="145" cy="273" r="24" fill="#eef2ff"/>
    <path d="M132 259h26v20h-26zM137 284h16M145 279v5" fill="none" stroke="#4f46e5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="184" y="278" class="node-title title">Browser</text>
    <text x="128" y="321" class="node-text title">Admin console &amp; API clients</text>
  </g>

  <path d="M361 287 H460" class="line"/>
  <text x="383" y="270" class="small title">HTTPS</text>

  <g filter="url(#shadow)">
    <rect x="460" y="224" width="310" height="126" rx="22" fill="url(#hero)"/>
    <circle cx="510" cy="273" r="24" fill="#ffffff" opacity=".17"/>
    <path d="M496 266h28M500 272h20M505 278h10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <text x="548" y="278" class="node-title-light title">Nginx / TLS Ingress</text>
    <text x="492" y="321" class="node-text-light title">HTTPS redirect · HSTS · security headers</text>
  </g>

  <path d="M615 350 V408 H447 V458" class="line"/>
  <path d="M615 350 V408 H907 V458" class="line"/>
  <text x="466" y="394" class="small title">static assets</text>
  <text x="815" y="394" class="small title">/api proxy</text>

  <g class="title">
    <text x="96" y="432" class="section">APPLICATION LAYER</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="96" y="458" width="520" height="180" rx="24" fill="url(#web)"/>
    <circle cx="151" cy="514" r="28" fill="#ffffff" opacity=".17"/>
    <path d="M135 501h32v25h-32zM141 534h20M151 526v8" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="197" y="516" class="node-title-light title">Next.js 16 Web</text>
    <text x="197" y="546" class="node-text-light title">App Router · React · Tailwind · Zustand</text>
    <line x1="128" y1="574" x2="584" y2="574" stroke="#fff" opacity=".2"/>
    <text x="128" y="608" class="small-light title">Static export · RBAC-aware UI · Swagger entry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="738" y="458" width="520" height="180" rx="24" fill="url(#api)"/>
    <circle cx="793" cy="514" r="28" fill="#ffffff" opacity=".17"/>
    <path d="M776 503h34v22h-34zM782 510h4M792 510h4M802 510h4M784 534h18" fill="none" stroke="#fff" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="839" y="516" class="node-title-light title">NestJS 11 API</text>
    <text x="839" y="546" class="node-text-light title">Fastify · Prisma · Swagger · DTO validation</text>
    <line x1="770" y1="574" x2="1226" y2="574" stroke="#fff" opacity=".2"/>
    <text x="770" y="608" class="small-light title">Default-deny auth · RBAC · distributed throttling</text>
  </g>

  <path d="M1258 548 H1360" class="line-soft"/>
  <g filter="url(#shadow)">
    <rect x="1360" y="458" width="144" height="180" rx="22" fill="#ffffff"/>
    <text x="1432" y="500" text-anchor="middle" class="node-title title">AI</text>
    <text x="1432" y="531" text-anchor="middle" class="node-text title">OpenAI</text>
    <text x="1432" y="555" text-anchor="middle" class="node-text title">compatible</text>
    <line x1="1384" y1="579" x2="1480" y2="579" stroke="#e2e8f0"/>
    <text x="1432" y="609" text-anchor="middle" class="small title">Optional</text>
  </g>

  <g class="title">
    <text x="96" y="712" class="section">STATE, DATA &amp; FILES</text>
  </g>

  <path d="M918 638 V712 H333 V762" class="line"/>
  <path d="M998 638 V712 H795 V762" class="line"/>
  <path d="M1078 638 V712 H1257 V762" class="line"/>

  <g filter="url(#shadow)">
    <rect x="96" y="762" width="474" height="130" rx="22" fill="#ffffff"/>
    <circle cx="145" cy="811" r="23" fill="#eff6ff"/>
    <ellipse cx="145" cy="802" rx="14" ry="6" fill="none" stroke="#2563eb" stroke-width="3"/>
    <path d="M131 802v18c0 4 28 4 28 0v-18M131 811c0 4 28 4 28 0" fill="none" stroke="#2563eb" stroke-width="3"/>
    <text x="185" y="810" class="node-title title">PostgreSQL / MySQL</text>
    <text x="128" y="854" class="node-text title">Independent schema and migration histories</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="632" y="762" width="326" height="130" rx="22" fill="#ffffff"/>
    <circle cx="681" cy="811" r="23" fill="#ecfdf5"/>
    <path d="M670 800h22v22h-22zM674 795v5M681 795v5M688 795v5M674 822v5M681 822v5M688 822v5" fill="none" stroke="#059669" stroke-width="2.7" stroke-linecap="round"/>
    <text x="721" y="810" class="node-title title">Redis</text>
    <text x="664" y="854" class="node-text title">Throttle · token state · cache</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1020" y="762" width="484" height="130" rx="22" fill="#ffffff"/>
    <circle cx="1069" cy="811" r="23" fill="#fdf4ff"/>
    <path d="M1057 815h24a10 10 0 0 0 0-20 14 14 0 0 0-26-2 11 11 0 0 0 2 22z" fill="none" stroke="#c026d3" stroke-width="3" stroke-linecap="round"/>
    <text x="1109" y="810" class="node-title title">File Storage</text>
    <text x="1052" y="854" class="node-text title">Local volume · Aliyun OSS · Tencent COS</text>
  </g>

  <path d="M1280 160 V224" class="line-soft"/>
  <g filter="url(#shadow)">
    <rect x="1100" y="36" width="360" height="124" rx="22" fill="#ffffff"/>
    <text x="1132" y="83" class="node-title title">GitHub Actions</text>
    <text x="1132" y="112" class="node-text title">Typecheck · lint · tests · migrations</text>
    <text x="1132" y="136" class="node-text title">Gitleaks · dependency &amp; image scanning</text>
  </g>

  <path d="M798 892 V932" class="line"/>
  <g filter="url(#shadow)">
    <rect x="380" y="932" width="836" height="36" rx="18" fill="url(#deploy)"/>
    <text x="798" y="957" text-anchor="middle" class="small-light title">DEPLOYMENT: Docker Compose · PM2 · Offline package · Health checks · Graceful shutdown</text>
  </g>
</svg>
